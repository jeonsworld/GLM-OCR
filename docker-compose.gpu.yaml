services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: glm-ocr-vllm
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - vllm_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    command:
      - --model
      - THUDM/GLM-OCR
      - --served-model-name
      - glm-ocr
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --trust-remote-code
      - --max-model-len
      - "16384"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  glm-ocr:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: glm-ocr-server
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "8511:8511"
    volumes:
      - ./config-vllm.yaml:/app/config-vllm.yaml
    depends_on:
      vllm:
        condition: service_healthy
    command: ["python", "-m", "glmocr.server", "--config", "/app/config-vllm.yaml"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  vllm_cache:
