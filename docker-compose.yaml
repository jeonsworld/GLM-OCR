services:
  ollama:
    image: ollama/ollama:latest
    container_name: glm-ocr-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  glm-ocr:
    build: .
    container_name: glm-ocr-server
    ports:
      - "8511:8511"
    volumes:
      - ./config-ollama.yaml:/app/config-ollama.yaml
    depends_on:
      ollama:
        condition: service_healthy
    command: ["--config", "/app/config-ollama.yaml"]

volumes:
  ollama_data:
