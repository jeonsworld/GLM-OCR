server:
  host: "0.0.0.0"
  port: 8511
  debug: false

logging:
  level: INFO

pipeline:
  maas:
    enabled: false

  ocr_api:
    api_host: ollama
    api_port: 11434
    api_path: /api/generate
    model: glm-ocr:latest
    api_mode: ollama_generate
    verify_ssl: false
    connect_timeout: 60
    request_timeout: 300

  enable_layout: true

  layout:
    model_dir: PaddlePaddle/PP-DocLayoutV3_safetensors
    device: cpu
    threshold: 0.3
    batch_size: 1
    workers: 1
